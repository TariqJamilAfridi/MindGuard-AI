<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MindGuard Admin — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ink:#080b0e; --ink2:#0f1317; --ink3:#171c21; --ink4:#1e252c;
      --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
      --text:#e9e4dc; --text2:#a09890; --text3:#5a5550;
      --gold:#c9a96e; --gold-dim:rgba(201,169,110,0.12);
      --terra:#c97a62; --terra-dim:rgba(201,122,98,0.1);
      --font-d:'Cormorant Garamond',Georgia,serif;
      --font-b:'Outfit',system-ui,sans-serif;
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:var(--font-b);
      background:var(--ink);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    /* Animated background grid */
    body::before {
      content:'';
      position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(201,169,110,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,169,110,0.03) 1px, transparent 1px);
      background-size:60px 60px;
      pointer-events:none;
      z-index:0;
    }
    .card {
      background:var(--ink2);
      border:1px solid var(--border2);
      border-radius:18px;
      padding:48px 44px;
      width:100%; max-width:420px;
      box-shadow:0 30px 80px rgba(0,0,0,0.6), 0 4px 20px rgba(0,0,0,0.4);
      position:relative; z-index:1;
      animation:cardIn .4s cubic-bezier(0.34,1.3,0.64,1);
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(24px) scale(0.96); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }
    .logo {
      display:flex; align-items:center; gap:12px;
      margin-bottom:32px;
    }
    .logo-orb {
      width:44px; height:44px; border-radius:50%;
      background:conic-gradient(#c9a96e,#82b09a,#c97a62,#c9a96e);
      animation:spin 8s linear infinite;
      box-shadow:0 0 24px rgba(201,169,110,0.3);
      flex-shrink:0;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .logo-text { font-family:var(--font-d); font-size:1.5rem; color:var(--text); }
    .logo-badge {
      background:var(--gold-dim);
      border:1px solid rgba(201,169,110,0.25);
      color:var(--gold);
      font-size:.6rem; font-weight:600;
      letter-spacing:.1em; text-transform:uppercase;
      padding:2px 8px; border-radius:20px;
      margin-top:2px;
    }
    h1 {
      font-family:var(--font-d);
      font-size:1.9rem; font-weight:400;
      margin-bottom:6px;
    }
    .subtitle {
      color:var(--text3); font-size:.82rem;
      margin-bottom:32px; line-height:1.5;
    }
    .field { margin-bottom:20px; }
    .field label {
      display:block; font-size:.7rem; font-weight:600;
      letter-spacing:.09em; text-transform:uppercase;
      color:var(--text2); margin-bottom:8px;
    }
    .field input {
      width:100%; background:var(--ink3);
      border:1px solid var(--border);
      border-radius:10px; color:var(--text);
      font-family:var(--font-b); font-size:.92rem;
      padding:12px 16px; outline:none;
      transition:border-color .2s, box-shadow .2s;
    }
    .field input:focus {
      border-color:rgba(201,169,110,.4);
      box-shadow:0 0 0 3px rgba(201,169,110,.07);
    }
    .field input::placeholder { color:var(--text3); }
    .error-msg {
      background:var(--terra-dim);
      border:1px solid rgba(201,122,98,.3);
      border-radius:8px;
      color:var(--terra);
      font-size:.8rem;
      padding:10px 14px;
      margin-bottom:18px;
    }
    .btn-submit {
      width:100%;
      background:linear-gradient(135deg,#c9a96e,#b8924a);
      color:var(--ink); border:none;
      border-radius:10px; font-family:var(--font-b);
      font-size:.88rem; font-weight:600;
      letter-spacing:.05em; text-transform:uppercase;
      padding:14px 0; cursor:pointer;
      transition:all .22s;
    }
    .btn-submit:hover {
      transform:translateY(-2px);
      box-shadow:0 8px 24px rgba(201,169,110,.35);
    }
    .back-link {
      display:block; text-align:center;
      margin-top:20px; font-size:.78rem;
      color:var(--text3);
    }
    .back-link a { color:var(--gold); }
    .back-link a:hover { text-decoration:underline; }
    .divider {
      height:1px; background:var(--border);
      margin:28px 0;
    }
    .hint {
      background:var(--ink3);
      border:1px solid var(--border);
      border-radius:10px;
      padding:14px 16px;
      font-size:.76rem;
      color:var(--text3);
      line-height:1.6;
    }
    .hint strong { color:var(--text2); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-orb"></div>
      <div>
        <div class="logo-text">MindGuard</div>
        <div class="logo-badge">Admin Panel</div>
      </div>
    </div>

    <h1>Sign in</h1>
    <p class="subtitle">This area is restricted to administrators only.</p>

    {% if error %}
    <div class="error-msg">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/admin/login">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" placeholder="admin" autocomplete="username" required/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn-submit">Access Admin Panel →</button>
    </form>

    <div class="divider"></div>
    <div class="hint">
      <strong>Default credentials:</strong><br>
      Username: <code>admin</code> &nbsp;·&nbsp; Password: <code>mindguard2026</code><br>
      Change these in <code>app.py</code> before your demo.
    </div>

    <p class="back-link"><a href="/">← Back to MindGuard</a></p>
  </div>
</body>
</html>
